<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Habit Tracker — Wireframe Exploration</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #ebe6d6; font-family: "Patrick Hand", system-ui, sans-serif; color: #1f1a14; }
  #root { width: 100vw; height: 100vh; }
  .intro {
    max-width: 760px; padding: 18px 22px;
    font-family: "Patrick Hand", system-ui, sans-serif;
    font-size: 15px; line-height: 1.5; color: #1f1a14;
  }
  .intro h1 { font-family: "Caveat", cursive; font-size: 38px; margin: 0 0 6px; font-weight: 700; }
  .intro p { margin: 6px 0; }
  .intro .meta { font-size: 12px; color: rgba(31,26,20,0.55); margin-top: 10px; font-family: "JetBrains Mono", monospace; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wireframes.jsx"></script>
<script type="text/babel" src="setup-and-reveal.jsx"></script>
<script type="text/babel" src="tabbed-app.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState } = React;

const Intro = () => (
  <div className="intro">
    <h1>30-day habit & challenge tracker — wireframes</h1>
    <p>
      Pre-set all 15 habits at the start — one reveals each morning (advent-calendar style)
      for the first 15 days. Days 16-30 = practice all 15.
      Mix of checkbox + numeric. Missed days break that habit's streak but stay in history.
    </p>
    <p style={{color: 'rgba(31,26,20,0.6)'}}>
      Aesthetic: warm notebook · off-white paper · ink · one terracotta accent · hand-drawn.
      The app has 4 view modes you can tab between (Notebook, Grid, Streaks, vs Jordan).
      Try the interactive bits — click reveal tiles, switch tabs.
    </p>
    <div className="meta">v1 · {new Date().toISOString().slice(0,10)} · ask for tweaks or to push any direction further</div>
  </div>
);

const App = () => (
  <DesignCanvas intro={<Intro />}>
    <DCSection id="setup" title="Setup — write all 15 up front" subtitle="user defines the full list before starting; can't edit after">
      <DCArtboard id="s1" label="Setup · desktop" width={1100} height={780}>
        <SetupScreen />
      </DCArtboard>
      <DCArtboard id="s2" label="Setup · mobile" width={360} height={780}>
        <SetupScreen mobile />
      </DCArtboard>
    </DCSection>

    <DCSection id="reveal" title="The daily reveal" subtitle="advent-calendar style — locked tiles, today's glows · click to unwrap">
      <DCArtboard id="r1" label="Advent calendar · desktop" width={760} height={640}>
        <RevealCalendar />
      </DCArtboard>
      <DCArtboard id="r1m" label="Advent calendar · mobile" width={360} height={720}>
        <RevealCalendar mobile />
      </DCArtboard>
    </DCSection>

    <DCSection id="app" title="The app — 4 views as tabs" subtitle="user can switch between Notebook / Grid / Streaks / vs-Jordan · click the tabs">
      <DCArtboard id="app-d" label="Desktop · tabs at top" width={1200} height={820}>
        <TabbedApp />
      </DCArtboard>
      <DCArtboard id="app-m" label="Mobile · tabs at bottom" width={380} height={780}>
        <TabbedApp mobile />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
